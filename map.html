<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get me home ! - Carte</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="elem-container">
        <div id="searchpanel">
            <div class="title_container">
                <p id="search_title"><strong>Rechercher par critère</strong></p>
            </div>
            <div class="all-sliders">
                <div class="slider-container">
                    <div class="slider-label">Forte densité de population : <strong><span id="value_poids_dpop_desc">5</span></strong></div>
                    <input type="range" min="0" max="10" value="5" class="slider" id="poids_dpop_desc">
                </div>
                <div class="slider-container">
                    <div class="slider-label">Faible densité de population : <strong><span id="value_poids_dpop_asc">0</span></strong></div>
                    <input type="range" min="0" max="10" value="0" class="slider" id="poids_dpop_asc">
                </div>
                <div class="slider-container">
                    <div class="slider-label">Surface de forêt (r. 10km) : <strong><span id="value_poids_foret">5</span></strong></div>
                    <input type="range" min="0" max="10" value="5" class="slider" id="poids_foret">
                </div>
                <div class="subtitle_cont">
                    <p id="subtitle"><strong>Risques naturels et industriels</strong></p>
                </div>
                <div class="slider-container">
                    <div class="slider-label">Retrait/gonflement des argiles : <strong><span id="value_poids_rga">5</span></strong></div>
                    <input type="range" min="0" max="10" value="5" class="slider" id="poids_rga">
                </div>
                <div class="slider-container">
                    <div class="slider-label">Inondations : <strong><span id="value_poids_inondation">5</span></strong></div>
                    <input type="range" min="0" max="10" value="5" class="slider" id="poids_inondation">
                </div>
                <div class="slider-container">
                    <div class="slider-label">Incendies : <strong><span id="value_poids_incendies">5</span></strong></div>
                    <input type="range" min="0" max="10" value="5" class="slider" id="poids_incendies">
                </div>
                <div class="slider-container">
                    <div class="slider-label">Sites SEVESO : <strong><span id="value_poids_seveso">5</span></strong></div>
                    <input type="range" min="0" max="10" value="5" class="slider" id="poids_seveso">
                </div>
            </div>
            <div class="button-container">
                <button id="sendButton">Appliquer les critères</button>
            </div>
            <button id="hide_json">Cacher les scores</button>
        </div>
        <div class="loader-container">
            <div id="map"></div>
            <div class="loader" id="loader"></div>
        </div>
        <div class="overlay" id="overlay"></div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.1.0/chroma.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="scripts/map.js"></script>
</body>
</html>
